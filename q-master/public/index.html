<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Queue | Q Master</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand-mark small" href="/">
      <span class="brand-icon">Q</span>
      <span>Q Master</span>
    </a>
    <a class="text-link" href="/admin">Admin</a>
  </header>

  <main class="page-shell">
    <section class="page-heading">
      <p class="eyebrow">Nhas City Chicken</p>
      <h1>Walk-In Queue</h1>
      <p>Join the queue with your name and follow your position live.</p>
    </section>

    <section class="grid-layout">
      <div class="panel">
        <h2>Join Queue</h2>
        <form id="joinForm" class="form-stack">
          <label for="customerName">Customer Name</label>
          <input id="customerName" name="customerName" type="text" placeholder="Enter your name" autocomplete="name" required>
          <button class="primary-button" type="submit">Get My Ticket</button>
        </form>
        <p id="joinMessage" class="message" role="status"></p>
      </div>

      <div class="panel ticket-panel">
        <h2>Your Queue Status</h2>
        <div class="ticket-number" id="ticketNumber">No ticket yet</div>
        <div class="status-grid">
          <div>
            <span>Queue Position</span>
            <strong id="queuePosition">-</strong>
          </div>
          <div>
            <span>Estimated Wait</span>
            <strong id="estimatedWait">-</strong>
          </div>
          <div>
            <span>Current Serving</span>
            <strong id="currentServing">None</strong>
          </div>
          <div>
            <span>Queue Status</span>
            <strong id="queueStatus">Open</strong>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
