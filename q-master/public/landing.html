<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q Master | Nhas City Chicken</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="landing-page">
    <section class="hero">
      <div class="brand-mark" aria-label="Q Master logo">
        <span class="brand-icon">Q</span>
        <span>Q Master</span>
      </div>

      <p class="eyebrow">Nhas City Chicken</p>
      <h1>Digital Walk-In Queue</h1>
      <p class="hero-copy">
        Avoid waiting in line physically. Join the digital queue and track your queue status in real time.
      </p>
      <p class="support-copy">
        Customers access Q Master by scanning a QR code located at the restaurant entrance or on the table.
      </p>

      <a class="primary-button" href="/queue">Join Queue at Nhas City Chicken</a>
    </section>
  </main>
